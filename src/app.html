<!doctype html>
<html lang="it">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="FormikaDesk è il gestionale desktop in locale per piccole attività indipendenti: fatture, magazzino e report. I tuoi dati restano sul tuo computer, anche senza internet."
		/>
		<meta name="theme-color" content="#185FA5" />

		<!-- Open Graph -->
		<meta property="og:title" content="FormikaDesk — Il gestionale che resta sul tuo computer" />
		<meta
			property="og:description"
			content="Gestionale desktop in locale per piccole attività. Fatture, magazzino e report, senza canoni cloud."
		/>
		<meta property="og:type" content="website" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
